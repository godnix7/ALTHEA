{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card shadow-sm">
    <div class="auth-header text-center">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle text-muted">
        Log in to continue your mindful journey.
      </p>
    </div>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input
          type="email"
          class="form-control form-control-lg"
          id="email"
          name="email"
          placeholder="name@example.com"
          autocomplete="email"
          required
        />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          class="form-control form-control-lg"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
      </div>
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <a class="text-muted small" href="#">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block">
        Log In
      </button>
    </form>
    <div class="auth-footer text-center">
      <span class="text-muted">Don't have an account?</span>
      <a href="{{ url_for('auth.sign_up') }}">Sign up</a>
    </div>
  </div>
</div>

<style>
  .auth-page {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 0;
    background: linear-gradient(160deg, rgba(248, 248, 248, 0.9), rgba(245, 245, 220, 0.5));
  }

  .auth-card {
    width: min(420px, 100%);
    border-radius: 16px;
    padding: 2.5rem 2.25rem;
    background: rgba(255, 255, 255, 0.94);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.6);
  }

  .auth-title {
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .auth-subtitle {
    font-size: 0.95rem;
    margin-bottom: 1.75rem;
  }

  .auth-form .form-group label {
    font-weight: 500;
  }

  .auth-form .form-control {
    border-radius: 10px;
    padding: 0.75rem 1rem;
    background: #F5F5DC;
    border: 1px solid #E2E2C8;
    color: #1a1a1a;
  }

  .auth-form .form-control:focus {
    border-color: #D6D6BB;
    box-shadow: 0 0 0 0.2rem rgba(210, 210, 180, 0.35);
  }

  .btn-block {
    width: 100%;
  }

  .btn-primary {
    background: linear-gradient(135deg, #F5F5DC, #EAEAD1);
    color: #1a1a1a;
    border: 1px solid #E2E2C8;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
  }

  .auth-footer {
    margin-top: 2rem;
    font-size: 0.95rem;
  }

  .auth-footer a {
    margin-left: 0.35rem;
  }

  @media (max-width: 576px) {
    .auth-card {
      margin: 0 1rem;
      padding: 2rem 1.75rem;
    }

    .auth-page {
      padding: 1.5rem 0;
    }
  }
</style>
{% endblock %}
